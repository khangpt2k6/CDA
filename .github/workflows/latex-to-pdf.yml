name: LaTeX to PDF

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile Lab 8 LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cda_lab8.tex
          working_directory: cda_lab8

      - name: Compile Lab 9 LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cd_lab9.tex
          working_directory: cda_lab9

      - name: Commit and push PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f cda_lab8/cda_lab8.pdf cda_lab9/cd_lab9.pdf
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-generate Lab 8 and Lab 9 PDFs from LaTeX"
            git push
          fi
